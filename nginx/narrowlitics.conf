# Narrowlitics Nginx Config
# Copy to /etc/nginx/sites-enabled/narrowlitics on Hetzner server
# Then run: sudo certbot --nginx -d narrowlitics.capainofindustries.com

server {
    listen 80;
    server_name narrowlitics.capainofindustries.com;

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR in dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large file uploads (compressed video metadata)
        client_max_body_size 200M;
        proxy_read_timeout 300s;
    }
}
